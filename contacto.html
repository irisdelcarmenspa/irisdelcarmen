<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iris del Carmen - Consultoría</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      background: #ffffff;
    }

    /* HEADER */
    .top-header {
      background-color: #ffffff;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .top-header img {
      max-height: 75%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* NAV */
    nav {
      background-color: #0b2a5b;
      display: flex;
      justify-content: flex-start;
      padding: 10px 60px;
      gap: 40px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav a:hover {
      opacity: 0.8;
    }

    /* HERO */
    .hero {
      position: relative;
      text-align: center;
      padding: 5px 20px 50px;
      background-color: #e9e9e9;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 52%;
      left: 50%;
      width: 520px;
      height: 200px;
      background-image: url('logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.06;
      transform: translate(-50%, -50%);
    }

    .hero h2 {
      position: relative;
      color: #0b2a5b;
      font-size: 30px;
      font-weight: 300;
      margin-bottom: 0px;
    }

    .hero p {
      position: relative;
      color: #0b2a5b;
      font-size: 18px;
      max-width: 500px;
      margin: 10px auto;
      line-height: 1.1;
      font-weight: 400;
    }

    /* FORMULARIO */
    .contact-form {
      position: relative;
      max-width: 650px;
      width: 100%;
      margin: 20px auto 0;
      background: white;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      text-align: left;
    }

    .contact-form label {
      display: block;
      margin-bottom: 4px;
      color: #0b2a5b;
      font-weight: 600;
      font-size: 14px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
    }

    .contact-form input {
      height: 38px;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 120px;
      overflow-y: auto;
    }

    .contact-form button {
      background-color: #0b2a5b;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .contact-form button:hover {
      background-color: #133d7d;
    }

    /* FOOTER */
    footer {
      background-color: #0b2a5b;
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav {
        padding: 10px 20px;
        gap: 20px;
      }

      .hero {
        padding: 40px 15px;
      }

      .hero h2 {
        font-size: 22px;
      }

      .hero p {
        font-size: 16px;
      }

      .hero::before {
        width: 300px;
        height: 300px;
      }

      .contact-form {
        padding: 12px;
      }

      .contact-form textarea {
        min-height: 60px;
      }
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="top-header">
    <img src="logo.png" alt="Iris del Carmen">
  </div>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html">INICIO</a>
    <a href="quehacemos.html">QUE HACEMOS</a>
    <a href="contacto.html">CONTACTO</a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Contacto</h2>

    <p><strong>Email:</strong> roberto@irisdelcarmen.cl</p>
    <p><strong>Teléfono:</strong> +56 9 9449 4294</p>

    <!-- FORMULARIO -->
    <form 
      class="contact-form"
      action="https://formspree.io/f/mkoywkoa"
      method="POST"
    >
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required>

      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" name="mensaje" required></textarea>

      <button type="submit">Enviar Mensaje</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Iris del Carmen</p>
  </footer>

</body>
</html>
