<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iris del Carmen - Consultoría</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      background: #ffffff;
    }

    /* 👇 CLAVE: layout en columna */
    body {
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .top-header {
      background-color: #ffffff;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .top-header img {
      max-height: 75%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* NAV */
    nav {
      background-color: #0b2a5b;
      display: flex;
      justify-content: flex-start;
      padding: 10px 60px;
      gap: 40px;
      flex-shrink: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav a:hover {
      opacity: 0.8;
    }

    /* HERO */
    .hero {
      position: relative;
      text-align: center;
      padding: 20px 20px 30px;
      background-color: #e9e9e9;
      overflow: hidden;

      flex: 1; /* 👈 ESTO elimina la franja blanca */
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 52%;
      left: 50%;
      width: 520px;
      height: 520px;
      background-image: url('logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.06;
      transform: translate(-50%, -50%);
    }

    .hero h2 {
      position: relative;
      color: #0b2a5b;
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .hero p {
      position: relative;
      color: #0b2a5b;
      font-size: 15px;
      margin: 0 auto 8px;
      max-width: 650px;
      font-weight: 600;
    }

    /* FORM */
    form {
      position: relative;
      max-width: 420px;
      width: 100%;
      margin: 6px auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input, textarea {
      padding: 5px;
      border: 1px solid #ccc;
      font-size: 13px;
    }

    textarea {
      height: 50px;
      resize: none;
    }

    button {
      padding: 7px;
      background: #0b2a5b;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .contact-info {
      font-size: 12.5px;
      margin-top: 5px;
      line-height: 1.2;
    }

    /* FOOTER */
    footer {
      background-color: #0b2a5b;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 12.5px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav {
        padding: 10px 20px;
        gap: 20px;
      }

      .hero {
        padding: 60px 15px;
      }

      .hero h2 {
        font-size: 22px;
      }

      .hero p {
        font-size: 16px;
      }

      .hero::before {
        width: 300px;
        height: 300px;
      }
    }

  </style>
</head>

<body>

<div class="top-header">
  <img src="logo.png" alt="Iris del Carmen">
</div>

<nav>
  <a href="index.html">INICIO</a>
  <a href="contacto.html">CONTACTO</a>
</nav>

<section class="hero">

  <h2>Contacto</h2>

  <p>Déjanos tus datos, nosotros te contactamos</p>

  <form action="https://formspree.io/f/mkoywkoa" method="POST">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefono" placeholder="Teléfono">
    <textarea name="mensaje" placeholder="Mensaje" required></textarea>
    <button type="submit">Enviar</button>
  </form>

  <div class="contact-info">
    <p><strong>e-mail:</strong> roberto@irisdelcarmen.cl</p>
    <p><strong>Teléfono:</strong> +56 9 9449 4294</p>
  </div>

</section>

<footer>
  <p>© 2026 Iris del Carmen</p>
</footer>

</body>
</html>
