<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iris del Carmen - Consultoría</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .top-header {
      background-color: #ffffff;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .top-header img {
      max-height: 70%;
      width: auto;
      object-fit: contain;
    }

    /* NAV */
    nav {
      background-color: #0b2a5b;
      display: flex;
      justify-content: flex-start;
      padding: 8px 60px;
      gap: 40px;
      flex-shrink: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    nav a:hover {
      opacity: 0.8;
    }

    /* HERO */
    .hero {
      position: relative;
      background-color: #e9e9e9;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 20px;
      overflow: hidden;
      text-align: center;
    }

    /* Marca de agua */
    .hero::before {
      content: "";
      position: absolute;
      top: 52%;
      left: 50%;
      width: 420px;
      height: 420px;
      background-image: url('logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.05;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .hero h2 {
      position: relative;
      color: #0b2a5b;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
      z-index: 1;
    }

    .hero p {
      position: relative;
      color: #0b2a5b;
      font-size: 18px;
      margin: 5px 0 15px;
      font-weight: 600;
      z-index: 1;
    }

    /* FORM */
    form {
      position: relative;
      max-width: 500px;
      width: 100%;
      margin: 0 auto 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1;
    }

    input, textarea {
      padding: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 70px;
    }

    button {
      padding: 10px;
      background: #0b2a5b;
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    /* CONTACTO TEXTO */
    .contact-info {
      position: relative;
      font-size: 14px;
      z-index: 1;
    }

    /* FOOTER */
    footer {
      background-color: #0b2a5b;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Ajuste extra para pantallas bajas */
    @media (max-height: 800px) {
      .hero {
        transform: scale(0.95);
        transform-origin: top center;
      }
    }

  </style>
</head>

<body>

<!-- LOGO -->
<div class="top-header">
  <img src="logo.png" alt="Iris del Carmen">
</div>

<!-- NAVBAR -->
<nav>
  <a href="index.html">INICIO</a>
  <a href="contacto.html">CONTACTO</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h2>Contacto</h2>

  <p>Déjanos tus datos, nosotros te contactamos</p>

  <form action="https://formspree.io/f/mkoywkoa" method="POST">

    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefono" placeholder="Teléfono">
    <textarea name="mensaje" placeholder="Mensaje" required></textarea>

    <button type="submit">Enviar</button>

  </form>

  <div class="contact-info">
    <p><strong>e-mail:</strong> roberto@irisdelcarmen.cl</p>
    <p><strong>Teléfono:</strong> +56 9 9449 4294</p>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Iris del Carmen</p>
</footer>

</body>
</html>
</html>
