<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iris del Carmen - Consultoría</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8; /* quitamos el logo del fondo general */
    }

    header {
      background-color: #1f3a5f;
      padding: 15px;
      color: white;
      text-align: center;
    }

    nav {
      background-color: #2c5282;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* SECCIÓN CENTRAL CON LOGO GRANDE */
    .hero {
      position: relative;
      padding: 80px 20px;
      text-align: center;
      background-color: #dcdcdc;
      overflow: hidden;
    }

    /* Logo centrado ocupando ~90% */
    .hero::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 90%;
      height: 90%;
      background-image: url('logo.png'); /* asegúrate que la ruta sea correcta */
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain; /* mantiene proporciones */
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* Texto encima del logo */
    .hero h2,
    .hero p {
      position: relative;
      z-index: 1;
    }

    footer {
      background-color: #1f3a5f;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Iris del Carmen</h1>
  <p>Consultoría en Gestión</p>
</header>

<nav>
  <a href="index.html">INICIO</a>
  <a href="contacto.html">CONTACTO</a>
</nav>

<section class="hero">
  <h2>Bienvenidos</h2>
  <p>Ofrecemos servicios de consultoría en gestión para mejorar la eficiencia, organización y resultados de su empresa.</p>
</section>

<footer>
  <p>© 2026 Iris del Carmen</p>
</footer>

</body>
</html>

<footer>
  <p>© 2026 Iris del Carmen</p>
</footer>

</body>
</html>
